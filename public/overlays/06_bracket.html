<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<!--
  TOURNAMENT BRACKET — RESPAWN ØSTFOLD
  1920×1080 full-screen bracket display
  Edit the `bracket` data object below to update players/scores
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px;
    background: #102C31;
    overflow: hidden;
    position: relative;
    font-family: 'Press Start 2P', monospace;
  }

  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(135,206,52,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(135,206,52,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .bar-top    { position: absolute; top:0;    left:0; right:0; height:5px; background:#87CE34; }
  .bar-bottom { position: absolute; bottom:0; left:0; right:0; height:5px; background:#87CE34; }

  /* Header */
  .header {
    position: absolute;
    top: 20px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 24px;
    padding: 0 80px;
  }
  .header img { width: 40px; image-rendering: pixelated; }
  .header-text {
    display: flex; flex-direction: column; gap: 4px; align-items: center;
  }
  .header-title { color: #fff;    font-size: 16px; letter-spacing: 4px; }
  .header-sub   { color: #87CE34; font-size: 9px;  letter-spacing: 4px; }

  /* Corner brackets */
  .corner { position: absolute; width: 50px; height: 50px; }
  .corner::before, .corner::after { content:''; position: absolute; background: #87CE34; }
  .corner::before { width: 3px; height: 100%; }
  .corner::after  { width: 100%; height: 3px; }
  .tl { top:28px; left:28px; }
  .tr { top:28px; right:28px; transform: scaleX(-1); }
  .bl { bottom:28px; left:28px; transform: scaleY(-1); }
  .br { bottom:28px; right:28px; transform: scale(-1); }

  /* Bracket container */
  .bracket-area {
    position: absolute;
    top: 100px; left: 60px; right: 60px; bottom: 40px;
    display: flex; align-items: center;
    gap: 0;
  }

  /* Rounds */
  .round {
    display: flex; flex-direction: column;
    flex: 1; height: 100%;
    align-items: center; justify-content: space-around;
    position: relative;
  }
  .round-label {
    position: absolute; top: -32px; left: 50%;
    transform: translateX(-50%);
    color: #316364; font-size: 8px; letter-spacing: 3px;
    white-space: nowrap;
  }

  /* Match slot */
  .match {
    display: flex; flex-direction: column;
    width: 280px; gap: 0;
    position: relative;
  }

  .slot {
    height: 46px;
    background: #0D2328;
    border: 1px solid #1E4835;
    border-left: 3px solid #1E4835;
    display: flex; align-items: center;
    padding: 0 14px;
    gap: 12px;
    transition: border-color 0.2s;
    position: relative;
  }
  .slot.winner {
    border-left-color: #87CE34;
    background: #0F2E2E;
  }
  .slot.winner .slot-name { color: #87CE34; }
  .slot + .slot {
    border-top: 1px solid #152428;
  }

  .seed {
    color: #316364; font-size: 8px;
    min-width: 16px;
  }
  .slot-name {
    color: #fff; font-size: 11px; letter-spacing: 1px;
    flex: 1; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
  }
  .slot-score {
    color: #87CE34; font-size: 11px;
    min-width: 20px; text-align: right;
  }
  .slot-score.tbd { color: #1E4835; }

  .match-divider {
    height: 1px; background: #1D3338; width: 100%;
  }

  /* Connector lines */
  .connectors {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  /* Final winner display */
  .winner-display {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    flex: 0 0 200px;
  }
  .trophy-icon {
    width: 60px; height: 60px;
    background: #87CE34;
    display: flex; align-items: center; justify-content: center;
    color: #102C31; font-size: 24px;
  }
  .winner-label { color: #316364; font-size: 8px; letter-spacing: 3px; }
  .winner-name  { color: #87CE34; font-size: 14px; text-align: center; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bar-top"></div>
<div class="bar-bottom"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="header">
  <img src="logo.png" alt="">
  <div class="header-text">
    <div class="header-title">RESPAWN ØSTFOLD</div>
    <div class="header-sub">MCSR RANKED · SINGLE ELIMINATION</div>
  </div>
</div>

<div class="bracket-area" id="bracketArea">
  <!-- Generated by JS below -->
</div>

<script>
// ============================================================
// EDIT THIS DATA TO UPDATE THE BRACKET
// ============================================================
const bracket = {
  rounds: [
    {
      name: 'KVARTFINALE',
      matches: [
        { p1: {name:'Player_A', seed:1, score:2}, p2: {name:'Player_B', seed:8, score:0}, winner:1 },
        { p1: {name:'Player_C', seed:4, score:2}, p2: {name:'Player_D', seed:5, score:1}, winner:1 },
        { p1: {name:'Player_E', seed:3, score:'-'}, p2: {name:'Player_F', seed:6, score:'-'}, winner:0 },
        { p1: {name:'Player_G', seed:2, score:'-'}, p2: {name:'Player_H', seed:7, score:'-'}, winner:0 },
      ]
    },
    {
      name: 'SEMIFINALE',
      matches: [
        { p1: {name:'Player_A', seed:1, score:'-'}, p2: {name:'Player_C', seed:4, score:'-'}, winner:0 },
        { p1: {name:'TBD',      seed:'', score:'-'}, p2: {name:'TBD',     seed:'', score:'-'}, winner:0 },
      ]
    },
    {
      name: 'FINALE',
      matches: [
        { p1: {name:'TBD', seed:'', score:'-'}, p2: {name:'TBD', seed:'', score:'-'}, winner:0 },
      ]
    }
  ],
  champion: null // Set to winner name when known
};
// ============================================================

function buildBracket(data) {
  const area = document.getElementById('bracketArea');
  area.innerHTML = ''; // always clear first

  data.rounds.forEach((round) => {
    const col = document.createElement('div');
    col.className = 'round';

    const lbl = document.createElement('div');
    lbl.className = 'round-label';
    lbl.textContent = round.name;
    col.appendChild(lbl);

    round.matches.forEach(match => {
      const m = document.createElement('div');
      m.className = 'match';

      [1,2].forEach(n => {
        const p = n === 1 ? match.p1 : match.p2;
        const slot = document.createElement('div');
        slot.className = 'slot' + (match.winner === n ? ' winner' : '');

        const seed = document.createElement('div');
        seed.className = 'seed';
        seed.textContent = p.seed;

        const name = document.createElement('div');
        name.className = 'slot-name';
        name.textContent = p.name.toUpperCase();

        const score = document.createElement('div');
        score.className = 'slot-score' + (p.score === '-' ? ' tbd' : '');
        score.textContent = p.score;

        slot.appendChild(seed);
        slot.appendChild(name);
        slot.appendChild(score);
        m.appendChild(slot);
      });

      col.appendChild(m);
    });

    area.appendChild(col);
  });

  const champCol = document.createElement('div');
  champCol.className = 'winner-display';
  champCol.innerHTML =
    '<div class="trophy-icon">★</div>' +
    '<div class="winner-label">VINNER</div>' +
    '<div class="winner-name">' + (data.champion ? data.champion.toUpperCase() : '???') + '</div>';
  area.appendChild(champCol);
}

// Don't call buildBracket on load — wait for WS init instead
// Show empty placeholder until data arrives
document.getElementById('bracketArea').innerHTML =
  '<div style="color:#316364;font-family:monospace;font-size:12px;padding:40px;text-align:center">VENTER PÅ DATA FRA KONTROLLPANEL...</div>';
</script>
<script src="_ws_client.js"></script>
<script>
window.addEventListener('ro:bracket', function(e) {
  if (e.detail && e.detail.rounds) {
    buildBracket(e.detail);
  }
});
</script>

</html>
